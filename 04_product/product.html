<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>C w C AI簡報筆｜產品圖片展示</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- PhotoSwipe -->
<link rel="stylesheet" href="https://unpkg.com/photoswipe@5.4.4/dist/photoswipe.css"/>

<style>
:root{
  --neutral:#E8FFFB;
  --border:rgba(0,0,0,.08);
}
body{
  background:#E8FFFB;
}
.page-wrap{ max-width:960px; }

/* 主投影片 */
.main-slide{
  width:100%;
  height:500px;
  object-fit:contain;
  background:#fff;
  border-radius:16px;
  border:1px solid var(--border);
}

/* 縮圖列 */
.thumbnail-row{
  margin-top:15px;
  display:flex;
  gap:10px;
  overflow-x:auto;
}
.thumbnail-row img{
  height:80px;
  border-radius:10px;
  cursor:pointer;
  border:2px solid transparent;
  transition:all .2s ease;
}
.thumbnail-row img.active{
  border:2px solid #0d6efd;
}
.thumbnail-row img:hover{
  transform:scale(1.05);
}

.section-card{
  background:#fff;
  border-radius:18px;
  padding:30px;
  border:1px solid var(--border);
}

</style>
</head>

<body>

<div class="container page-wrap py-5">

<h2 class="mb-4 fw-bold">C w C AI簡報筆</h2>

<!-- 投影片區 -->
<div class="section-card mb-5">

<div class="text-center">
  <img id="currentImage"
       src="images/product1.png"
       class="main-slide"
       alt="產品主圖">
</div>

<!-- 縮圖 -->
<div class="thumbnail-row justify-content-center mt-4">

  <img src="images/product1.png" class="active thumb" data-index="0">
  <img src="images/product2.png" class="thumb" data-index="1">
  <img src="images/scene1.png" class="thumb" data-index="2">
  <img src="images/scene2.png" class="thumb" data-index="3">
  <img src="images/scene3.png" class="thumb" data-index="4">

</div>

<!-- PhotoSwipe Gallery (隱藏結構) -->
<div class="pswp-gallery d-none" id="productGallery">

  <a href="images/product1.png" data-pswp-width="1600" data-pswp-height="1200"></a>
  <a href="images/product2.png" data-pswp-width="1600" data-pswp-height="1200"></a>
  <a href="images/scene1.png" data-pswp-width="1920" data-pswp-height="1080"></a>
  <a href="images/scene2.png" data-pswp-width="1920" data-pswp-height="1080"></a>
  <a href="images/scene3.png" data-pswp-width="1920" data-pswp-height="1080"></a>

</div>

</div>

<!-- 產品介紹 -->
<div class="section-card">

<h4 class="fw-bold mb-3">核心內容</h4>

<p>
在每一次簡報關鍵時刻，你是否曾擔心忘詞、卡關，
或無法即時回應現場問題？
<strong>C w C AI簡報筆</strong>
將人工智慧導入簡報流程，
成為報告者的即時智慧助理。
</p>

<hr>

<h5 class="fw-bold mt-4">三大核心優勢</h5>

<ul>
<li><strong>即時AI資訊輔助</strong>：掌握脈絡，不遺漏關鍵數據。</li>
<li><strong>強化臨場反應能力</strong>：快速整合資訊，清晰回應問題。</li>
<li><strong>提升簡報效率與說服力</strong>：縮短準備時間，放大表達效果。</li>
</ul>

<p class="mt-4 fw-semibold">
C w C AI簡報筆，讓科技成為你的舞台後盾。
</p>

</div>

</div>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- PhotoSwipe -->
<script type="module">
import PhotoSwipeLightbox from 'https://unpkg.com/photoswipe@5.4.4/dist/photoswipe-lightbox.esm.js';

const lightbox = new PhotoSwipeLightbox({
  gallery: '#productGallery',
  children: 'a',
  pswpModule: () => import('https://unpkg.com/photoswipe@5.4.4/dist/photoswipe.esm.js')
});
lightbox.init();

const images = [
  "images/product1.png",
  "images/product2.png",
  "images/scene1.png",
  "images/scene2.png",
  "images/scene3.png"
];

const mainImg = document.getElementById("currentImage");
const thumbs = document.querySelectorAll(".thumb");

thumbs.forEach((thumb, index)=>{
  thumb.addEventListener("click", ()=>{
    mainImg.src = images[index];

    thumbs.forEach(t=>t.classList.remove("active"));
    thumb.classList.add("active");
  });
});

// 點擊主圖開啟 PhotoSwipe
mainImg.addEventListener("click", ()=>{
  lightbox.loadAndOpen(
    [...thumbs].findIndex(t=>t.classList.contains("active"))
  );
});
</script>

</body>
</html>
