<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Company Website Template</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --primary-color: #9BCFC4;
            --secondary-color: #D3F5E1;
            --accent-color: #47D1C6;
            --neutral-color: #E8FFFB;
        }

        body {
            background-color: var(--neutral-color);
        }

        .section-fixed {
            min-height: 500px;
        }

        /* Hover Effects */
        .navbar .nav-link,
        .navbar-brand,
        footer a {
            transition: all 0.3s ease;
        }

        .navbar .nav-link:hover,
        .navbar-brand:hover,
        footer a:hover {
            color: #47D1C6 !important;
            background-color: #ffffff;
            border-radius: 4px;
            padding-left: 8px;
            padding-right: 8px;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg bg-secondary navbar-dark">
        <div class="container">
            <a class="navbar-brand text-white" href="#" onclick="showSection('home')">
                <img src="images/logo.png" alt="Logo" height="40">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link text-white" href="#" onclick="showSection('product')">產品</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="#" onclick="showSection('spec')">規格</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="#" onclick="showSection('buy')">購買</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="#" onclick="showSection('faq')">問與答</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow-1">
<section id="home" style="padding:0; margin:0; line-height:0;">
    <iframe 
        src="02_company/company.html"
        style="width:100%; height:700px; border:0; display:block;">
    </iframe>
</section>

        <section id="product" class="container py-5 section-fixed d-none">
            <div class="row">
                 <div class="col-12">
            <iframe 
                src="04_product/product.html" 
                width="100%" 
                height="600" 
                style="border: none;">
            </iframe>
        </div>
            </div>
        </section>

        <section id="spec" class="container py-5 section-fixed d-none">
            <div class="row">
                 <div class="col-12">
            <iframe 
                src="05_table/table.html" 
                width="100%" 
                height="600" 
                style="border: none;">
            </iframe>
        </div>
            </div>
        </section>

        <section id="buy" class="container py-5 section-fixed d-none">
            <div class="row">
               <div class="col-12">
            <iframe 
                src="06_shopping/shopping.html" 
                width="100%" 
                height="600" 
                style="border: none;">
            </iframe>
        </div>
            </div>
        </section>

        <section id="faq" class="container py-5 section-fixed d-none">
            <div class="row">
                 <div class="col-12">
            <iframe 
                src="07_faq/faq.html" 
                width="100%" 
                height="600" 
                style="border: none;">
            </iframe>
        </div>
            </div>
        </section>

        <section id="about" class="container py-5 section-fixed d-none">
            <div class="row">
                <div class="col-12">
            <iframe 
                src="01_me/me.html" 
                width="100%" 
                height="600" 
                style="border: none;">
            </iframe>
        </div>
            </div>
        </section>

    </main>

    <!-- Footer -->
    <footer class="bg-secondary text-white py-3 mt-auto">
        <div class="container">
            <div class="row">
                <div class="col text-end">
                    <a href="#" class="text-white text-decoration-none" onclick="showSection('about')">關於我</a>
                </div>
            </div>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function showSection(sectionId) {
            const sections = ['home', 'product', 'spec', 'buy', 'faq', 'about'];
            sections.forEach(id => {
                const element = document.getElementById(id);
                if (id === sectionId) {
                    element.classList.remove('d-none');
                } else {
                    element.classList.add('d-none');
                }
            });
        }
    </script>

</body>
</html>
